<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yacoub Immobilien</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    header {
      background: #111;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    button {
      background: #111;
      color: white;
      border: none;
      padding: 12px 22px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>
<body>

  <header>
    <h1>Yacoub Immobilien</h1>
    <p>Test Website</p>
  </header>

  <main>
    <h2>Welcome</h2>
    <p>If you can see this, your GitHub Pages website works.</p>

    <button onclick="alert('Website works!')">
      Test Button
    </button>
  </main>

</body>
</html>
