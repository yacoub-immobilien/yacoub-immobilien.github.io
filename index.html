<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Immobilien Yacoub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
    }

    header {
      background: #000;
      text-align: center;
      padding: 40px 20px;
    }

    .logo {
      max-width: 420px;
      width: 85%;
      height: auto;
    }

    main {
      padding: 50px 20px;
      text-align: center;
    }

    h1 {
      font-size: 36px;
      text-decoration: underline;
      margin-bottom: 40px;
    }

    .angebote {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .karte {
      background: #f7f7f7;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      text-align: left;
    }

    .karte img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .text {
      padding: 18px;
    }

    .text h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .text p {
      margin: 6px 0;
      font-size: 16px;
      line-height: 1.4;
    }

    .preis {
      font-weight: bold;
      font-size: 18px;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" alt="Immobilien Yacoub Logo" class="logo">
  </header>

  <main>
    <h1>Mietangebote</h1>

    <div class="angebote" id="angebote"></div>
  </main>

  <script src="angebote.js"></script>

  <script>
    const bereich = document.getElementById("angebote");

    angebote.forEach(angebot => {
      bereich.innerHTML += `
        <div class="karte">
          <img src="${angebot.bild}" alt="${angebot.titel}">
          <div class="text">
            <h2>${angebot.titel}</h2>
            <p><strong>Ort:</strong> ${angebot.ort}</p>
            <p>${angebot.beschreibung}</p>
            <p class="preis">${angebot.preis}</p>
          </div>
        </div>
      `;
    });
  </script>

</body>
</html>
